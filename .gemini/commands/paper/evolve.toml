description = "既存ノートの進化を実行します（リンク再評価・タグ更新・文脈再生成）"

prompt = """
Paper Memoryの既存ノートを進化させてください。A-Memの進化原則に基づき、ノートのメタデータとリンクを再評価・更新します。

## 手順

1. **対象の特定**:
   - {{args}} が指定されている場合: そのノートIDまたは論文名のノートを進化対象とする
   - 指定なし: 全ノートを対象とする

2. **ノート一覧の取得**:
   ```
   python -m paper_memory list
   ```

3. **各ノートについて進化を実行**:
   a. **近傍検索**: `python -m paper_memory neighbors --note-id "<ID>"`
   b. **リンク評価**: 近傍ノートの内容と既存リンクを比較し、新しいリンクが必要か判断
   c. **リンク追加**: 必要に応じて `python -m paper_memory link --source "<ID>" --target "<targetID>" --reason "理由"`
   d. **タグ・文脈の更新提案**: 蓄積された知識全体を踏まえ、各ノートのタグや文脈記述を改善

4. **進化レポート**: 以下を報告:
   - 新たに追加されたリンク数
   - 更新されたタグ
   - 新たに発見された知識間の関連性

## 進化の判断基準
- **リンク追加**: 同じ概念、類似手法、結果の比較可能性、前提知識の関係がある場合
- **タグ更新**: より適切な分類や横断的なテーマが発見された場合
- **文脈更新**: 新しいノートによって重要性や位置づけが変わった場合
"""
