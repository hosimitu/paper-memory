description = "pdf/ フォルダ内のPDFファイルをスキャンします"

prompt = """
pdf/ フォルダ内のPDFファイルをスキャンして、システムに追加可能なファイルを確認してください。

## 手順

1. **スキャン実行**: 以下のコマンドを実行
   ```
   python -m paper_memory scan
   ```
2. **結果の表示**: 「未登録のPDF」と「登録済みのPDF」を分けて表示してください。
3. **提案**: 未登録のファイルがある場合、`/paper:add pdf/<ファイル名>` で追加することをユーザーに提案してください。すべてのファイルが登録済みの場合は、その旨を伝えてください。

## 出力フォーマット例

### 📂 PDFフォルダのスキャン結果
- ファイル1.pdf
- ファイル2.pdf

これらのファイルを追加するには `/paper:add pdf/<ファイル名>` を実行してください。
"""
