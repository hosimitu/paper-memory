description = "蓄積されたノートの一覧と統計を表示します"

prompt = """
Paper Memoryに蓄積されたノート一覧を表示してください。

## 手順

1. **統計情報の取得**:
   ```
   python -m paper_memory stats
   ```
2. **ノート一覧の取得**:
   - フィルタ指定なし: `python -m paper_memory list`
   - 論文名フィルタ: `python -m paper_memory list --paper "{{args}}"`
   - タイプフィルタ: `python -m paper_memory list --type "{{args}}"`
   - {{args}} の内容に応じて適切なフィルタを選択

3. **結果の整形**: 以下のフォーマットで表示

## 出力フォーマット

### 📊 Paper Memory 統計
- 総ノート数: N件
- 登録論文数: N件
- 総リンク数: N件
- 要素タイプ分布:
  - method: N件
  - result: N件
  ...

### 📝 ノート一覧
| # | タイプ | 内容（先頭60文字） | 元論文 | リンク数 |
|---|--------|--------------------|---------|---------| 
| 1 | method | ... | 論文名 | 3 |
...
"""
