name: ✨ 機能追加・改善
description: 新機能の提案や既存機能の改善
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 実現したいこと（目的）
      placeholder: 「なぜこれが必要なのか」「何ができるようになるのか」を記述してください
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: 具体的な内容
      placeholder: 実装したい機能のイメージや、具体的な動作フローを記述してください
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      placeholder: 他の方法で解決できないか、なぜこの方法が良いと考えたかを記述してください（あれば）
  - type: textarea
    id: additional-context
    attributes:
      label: 備考
      placeholder: 参考にしたURLや、関連する既存機能などがあれば記述してください