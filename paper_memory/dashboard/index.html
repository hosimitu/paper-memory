<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper Memory Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="brain-circuit" class="logo-icon"></i>
                    <span>Paper Memory</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="overview">
                    <i data-lucide="layout-dashboard"></i>
                    <span>概要</span>
                </a>
                <a href="#" class="nav-item" data-view="notes">
                    <i data-lucide="sticky-note"></i>
                    <span>知識ノート</span>
                </a>
                <a href="#" class="nav-item" data-view="papers">
                    <i data-lucide="book-open"></i>
                    <span>登録論文</span>
                </a>
                <a href="#" class="nav-item" data-view="references">
                    <i data-lucide="library"></i>
                    <span>参考文献</span>
                </a>
                <a href="#" class="nav-item" data-view="search">
                    <i data-lucide="search"></i>
                    <span>セマンティック検索</span>
                </a>
                <a href="#" class="nav-item" data-view="qa">
                    <i data-lucide="bot"></i>
                    <span>AIアシスタント</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="theme-btn">
                    <i data-lucide="sun" class="sun-icon"></i>
                    <i data-lucide="moon" class="moon-icon"></i>
                    <span>テーマ切替</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h1 id="view-title">概要</h1>
                <div class="user-actions">
                    <div class="status-badge" id="connection-status">
                        <span class="status-dot"></span>
                        <span id="server-status">Connected</span>
                    </div>
                </div>
            </header>

            <div id="content-area" class="content-area">
                <!-- Content will be injected here by app.js -->
                <div class="loader-container">
                    <div class="loader"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Templates -->
    <template id="tpl-overview">
        <div class="overview-grid">
            <div class="stat-card" data-goto="notes">
                <div class="stat-icon note-color"><i data-lucide="file-text"></i></div>
                <div class="stat-info">
                    <span class="stat-label">総ノート数</span>
                    <span class="stat-value" id="stat-total-notes">-</span>
                </div>
            </div>
            <div class="stat-card" data-goto="papers">
                <div class="stat-icon paper-color"><i data-lucide="book"></i></div>
                <div class="stat-info">
                    <span class="stat-label">登録論文数</span>
                    <span class="stat-value" id="stat-total-papers">-</span>
                </div>
            </div>
            <div class="stat-card" data-goto="search">
                <div class="stat-icon link-color"><i data-lucide="share-2"></i></div>
                <div class="stat-info">
                    <span class="stat-label">知識リンク数</span>
                    <span class="stat-value" id="stat-total-links">-</span>
                </div>
            </div>
            <div class="stat-card" data-goto="references">
                <div class="stat-icon ref-color"><i data-lucide="bookmark"></i></div>
                <div class="stat-info">
                    <span class="stat-label">未読参考文献</span>
                    <span class="stat-value" id="stat-total-refs">-</span>
                </div>
            </div>
        </div>

        <div class="dashboard-sections">
            <section class="dashboard-section chart-section">
                <h3><i data-lucide="pie-chart"></i> 知識分布</h3>
                <div id="type-distribution" class="type-tags"></div>
            </section>
            <section class="dashboard-section recent-section">
                <h3><i data-lucide="clock"></i> 最近追加された知識</h3>
                <div id="recent-notes" class="mini-note-list"></div>
            </section>
        </div>
    </template>

    <div id="note-modal" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <span id="modal-type" class="note-type">TYPE</span>
                <button class="modal-close"><i data-lucide="x"></i></button>
            </header>
            <div id="modal-body">
                <h2 id="modal-paper-title">Paper Title</h2>
                <div id="modal-paper-doi" style="margin-bottom: 24px; font-size: 0.85rem; opacity: 0.8;"></div>
                <div id="modal-content-full" class="modal-text-block"></div>
                
                <div class="modal-meta-grid">
                    <div class="modal-meta-section">
                        <h4><i data-lucide="key"></i> キーワード</h4>
                        <div id="modal-keywords" class="keyword-tags"></div>
                    </div>
                    <div class="modal-meta-section">
                        <h4><i data-lucide="message-square"></i> 文脈・前提</h4>
                        <div id="modal-context" class="modal-text-small"></div>
                    </div>
                </div>

                <div class="modal-links-section">
                    <h4><i data-lucide="share-2"></i> 関連ノート</h4>
                    <div id="modal-links" class="mini-note-list horizontal"></div>
                </div>

                <div id="modal-actions" class="modal-actions" style="display:none; margin-top:32px; padding-top:24px; border-top:1px solid var(--border); display:flex; gap:12px; justify-content: flex-end;">
                    <button id="btn-dismiss-ref" class="action-btn dismiss">
                        <i data-lucide="trash-2"></i> 参考文献から除外
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
